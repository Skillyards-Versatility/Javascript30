<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scoped CSS Variables and JS</title>
  <link rel="icon" href="https://fav.farm/🔥" />
</head>
<body>
  <h2>Update CSS Variables with <span class='hl'>JS</span></h2>

  <div class="controls">
    <label for="spacing">Spacing:</label>
    <input id="spacing" type="range" name="spacing" min="10" max="200" value="10" data-sizing="px">

    <label for="blur">Blur:</label>
    <input id="blur" type="range" name="blur" min="0" max="25" value="10" data-sizing="px">

    <label for="base">Base Color</label>
    <input id="base" type="color" name="base" value="#ffc600" style="width: 121px; border-radius: 10px;">
  </div>

  <img src="https://unsplash.it/800/500?image" class="img">

<style>
    :root{
      --base: #ffc800;
      --spacing: 10px;
      --blur: 10px;
    }
    body{
      justify-items: center;
      background-image: url(https://th.bing.com/th/id/R.6eaf3e49d623007651e4ef9631e5c6af?rik=Br00x9aIXE9C5Q&riu=http%3a%2f%2fimages.unsplash.com%2fphoto-1532190761747-215949f288d8%3fcrop%3dentropy%26cs%3dtinysrgb%26fit%3dmax%26fm%3djpg%26ixid%3dMnwxMjA3fDB8MXxzZWFyY2h8M3x8ZGFyayUyMGJsdXJ8fDB8fHx8MTYyNjk5NjM3Ng%26ixlib%3drb-1.2.1%26q%3d80%26w%3d1080&ehk=0e1nStvKDxUtj2%2fabBv1wnE0A5IHurx3BY%2f6DpZ1FEw%3d&risl=&pid=ImgRaw&r=0);
      background-repeat: no-repeat;
      background-size: cover;
      color: white;
    }
    img{
      padding: var(--spacing);
      background: var(--base);
      filter: blur(var(--blur));
      height: 400px;
      width: 600px;
      margin-left: 370px;
      margin-top: 40px;
      border-radius: 10px;
      box-shadow: 5px 10px 15px rgba(0, 0, 0, 0.3);
    }

    h1{
      color: var(--base)
    }
    h2{
      font-size: 30px;
      font-family: cursive;
    }
    label{
      font-size: 23px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

  </style>

  <script>
    const input = document.querySelectorAll('.controls input');

    function handleChange(){
      const abc = this.dataset.sizing || '';
      document.documentElement.style.setProperty(`--${this.name}`, this.value + abc);
    }

    input.forEach(input => input.addEventListener('change', handleChange));
    input.forEach(input => input.addEventListener('mousemove', handleChange));
  </script>

</body>
</html>
