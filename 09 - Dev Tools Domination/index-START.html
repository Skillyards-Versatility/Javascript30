<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Console Tricks!</title>
  <link rel="icon" href="https://fav.farm/🔥" />
</head>
<body>

  <p onClick="makeGreen()">×BREAK×DOWN×</p>

  <script>
    const dogs = [{ name: 'Snickers', age: 2 }, { name: 'hugo', age: 8 }];

    function makeGreen() {
      const p = document.querySelector('p');
      p.style.color = '#BADA55';
      p.style.fontSize = '50px';
    }

    // Regular
    console.log('hello');

    // Interpolated
    console.log(`Hello I am %s string`,`Skillyards`);

    // Styled
console.log(`%c I am some text`,`font-size:50px;background:red;text-shadow:10px;`)
    // warning!
console.warn("oh nooooo")
    // Error :|
console.error("barbaad")
    // Info
console.info('At Skillyards we offer 100% placement')
    // Testing
const p = document.querySelector('p')
console.assert(p.classList.contains('ouch'),'this is wrong')
    // clearing
console.clear()
    // Viewing DOM Elements
console.log(p)
console.dir(p)
    // Grouping together

    dogs.forEach(dog =>{
      console.groupCollapsed(`${dog.name}  : ${dog.age}` );
      console.groupEnd();
    })

    // counting
console.count('anuj')

    // timing
console.log('fetching data')
fetch('https://api.github.com/users/atul129e')
.then( d=> d.json())
.then(d=>{
  console.timeEnd('fetching your data')
  console.log(d)
})
  </script>
</body>
</html>
